title: "SuperCreator"
description: "A structured knowledge hub for books, ideas, productivity, product thinking, and innovation."
theme: jekyll-theme-cayman

baseurl: "/SuperCreator"
url: ""

markdown: kramdown
highlighter: rouge

plugins:
  - jekyll-feed
  - jekyll-seo-tag

kramdown:
  input: GFM
  hard_wrap: false

defaults:
  - scope:
      path: ""
    values:
      layout: default

exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
