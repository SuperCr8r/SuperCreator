---
layout: default
---

{% include navigation.md %}

<h1>{{ page.title }}</h1>

<div class="card-container">

{% assign tagged_pages = site.pages | where_exp:"p","p.tags contains page.tag" %}

{% for page in tagged_pages %}

<a class="card" href="{{ page.url | relative_url }}">

<img class="card-cover"
src="{{ '/assets/images/books/' | append: page.cover | relative_url }}"
alt="{{ page.title }}">

<div class="card-title">{{ page.title }}</div>

<div class="card-desc">{{ page.description }}</div>

</a>

{% endfor %}

</div>

{% include footer.md %}
